# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g base-index 1
set -g pane-base-index 1

set-option -g prefix C-b
set-option -g prefix2 none

set -g extended-keys on
set -g extended-keys-format csi-u

set-option -g set-titles on
set-option -g set-titles-string "#{pane_title}"

unbind r
bind r source-file ~/.config/tmux/tmux.conf

unbind v
bind v copy-mode

bind -r j resize-pane -D 3
bind -r k resize-pane -U 3
bind -r l resize-pane -R 3
bind -r h resize-pane -L 3

# mouse support
set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# <M+shift+h/l>
bind-key -n M-H previous-window
bind-key -n M-L next-window

# move windows using <M+num>
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# bind-key -r f run-shell "tmux neww ~/scripts/tmux-sessionizer"
bind-key n command-prompt "new-session -s '%%'"

unbind -T copy-mode-vi MouseDragEnd1Pane

# tmux plugin manager
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.tmux/plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically save sessions every 15 mins

set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-battery'

# set -g @plugin 'catppuccin/tmux#v2.3.0'

set -g @sessionx-bind 'o'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Configure Online
set -g @online_icon "ok"
set -g @offline_icon "nok"

# Style

# gruvbox material colorscheme (mostly) TODO: use a more defined gruvbox theme
RED="#ea6962"
GREEN="#a9b665"
YELLOW="#d8a657"
BLUE="#7daea3"
MAGENTA="#d3869b"
CYAN="#89b482"
BLACK="#1d2021"
DARK_GRAY="#32302F"
LIGHT_GRAY="#4F4946"
BG="#32302F"
FG="#d4be98"

HALF_ROUND_OPEN="#(printf '\uE0B6')"
HALF_ROUND_CLOSE="#(printf '\uE0B4')"
TRIANGLE_OPEN="#(printf '\uE0B2')"
TRIANGLE_CLOSE="#(printf '\uE0B0')"

# Status bar
set-option -g status-position top

set-option -g status-style bg=${BG},fg=${FG}

set-option -g status-justify absolute-centre

set-option -g status-left "\
#[bg=default,fg=${LIGHT_GRAY}]${TRIANGLE_OPEN}\
#[bg=${LIGHT_GRAY},fg=${YELLOW}]#S\
#[bg=default,fg=${LIGHT_GRAY}]${TRIANGLE_CLOSE}\
"

set-option -g status-right "\
#[bg=default,fg=${LIGHT_GRAY}]${HALF_ROUND_OPEN}\
#[bg=${LIGHT_GRAY},fg=${CYAN}]#h\
#[bg=default,fg=${LIGHT_GRAY}]${HALF_ROUND_CLOSE}\
"

set -g status-left-length 100
set -g status-right-length 100

set-option -g window-status-format "\
 #I\
#[fg=${MAGENTA}]:\
#[fg=default]#W \
"

set-option -g window-status-current-format "\
#[fg=${LIGHT_GRAY},bg=default]${HALF_ROUND_OPEN}\
#[bg=${LIGHT_GRAY},fg=default]#I\
#[fg=${RED}]:\
#[fg=default]#W\
#[fg=${LIGHT_GRAY},bg=default]${HALF_ROUND_CLOSE}\
"

set-option -g window-status-separator ""

run '~/.tmux/plugins/tpm/tpm'
